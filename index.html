<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Access Restricted</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#050816;
  color:white;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* BACKGROUND */
.bg{
  position:absolute;
  inset:0;
  overflow:hidden;
}

.blur{
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
}

.blur:nth-child(1){
  width:450px;
  height:450px;
  background:#6c63ff;
  top:-120px;
  left:-120px;
  opacity:.35;
}

.blur:nth-child(2){
  width:400px;
  height:400px;
  background:#00d4ff;
  bottom:-120px;
  right:-100px;
  opacity:.25;
}

.blur:nth-child(3){
  width:300px;
  height:300px;
  background:#ff3cac;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:.12;
}

/* GRID EFFECT */
.grid{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:linear-gradient(to bottom, transparent, black, transparent);
}

/* CARD */
.card{
  position:relative;
  z-index:5;
  width:90%;
  max-width:760px;
  padding:70px 50px;
  border-radius:35px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(25px);
  -webkit-backdrop-filter:blur(25px);

  box-shadow:
  0 0 40px rgba(0,0,0,0.35),
  inset 0 0 0 1px rgba(255,255,255,0.03);

  text-align:center;

  overflow:hidden;
}

/* LIGHT */
.card::before{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  top:-80px;
  right:-80px;
  filter:blur(40px);
}

.icon{
  width:95px;
  height:95px;
  margin:auto;
  margin-bottom:30px;

  border-radius:28px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:linear-gradient(135deg,#6c63ff,#00d4ff);

  box-shadow:
  0 10px 35px rgba(108,99,255,0.35);

  font-size:2.8rem;
}

.label{
  display:inline-flex;
  align-items:center;
  gap:8px;

  padding:10px 18px;
  border-radius:50px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);

  color:#d5d5d5;
  font-size:.85rem;
  margin-bottom:25px;
}

h1{
  font-size:4rem;
  line-height:1.05;
  margin-bottom:25px;
  font-weight:800;
}

h1 span{
  background:linear-gradient(to right,#6c63ff,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  max-width:580px;
  margin:auto;
  color:#b7b7b7;
  line-height:1.9;
  font-size:1rem;
  margin-bottom:40px;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
}

.btn{
  padding:16px 34px;
  border-radius:60px;
  text-decoration:none;
  font-weight:600;
  transition:.35s;
  border:1px solid transparent;
}

.btn-primary{
  background:linear-gradient(135deg,#6c63ff,#00d4ff);
  color:white;
}

.btn-primary:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 35px rgba(108,99,255,0.35);
}

.btn-secondary{
  border:1px solid rgba(255,255,255,0.12);
  color:white;
  background:rgba(255,255,255,0.03);
}

.btn-secondary:hover{
  background:white;
  color:#050816;
}

/* MOBILE */
@media(max-width:768px){

.card{
  padding:55px 25px;
}

h1{
  font-size:2.4rem;
}

p{
  font-size:.95rem;
}

.icon{
  width:80px;
  height:80px;
  font-size:2.2rem;
}

}

</style>
</head>
<body>

<div class="bg">
  <div class="blur"></div>
  <div class="blur"></div>
  <div class="blur"></div>
  <div class="grid"></div>
</div>

<div class="card">

  <div class="icon">
    🔒
  </div>

  <div class="label">
    PRIVATE ACCESS
  </div>

  <h1>
    Halaman Ini <br>
    <span>Dibatasi Pemilik</span>
  </h1>

  <p>
    Akses ke halaman ini telah dibatasi oleh pemilik website.
    Anda tidak memiliki izin untuk melihat konten yang tersedia saat ini.
  </p>

  <div class="buttons">
    <a href="javascript:history.back()" class="btn btn-primary">
  Kembali
</a>

    <a href="https://portofolioku-ivory.vercel.app/index.html" class="btn btn-secondary">
      Hubungi Admin
    </a>
  </div>

</div>

</body>
</html>
